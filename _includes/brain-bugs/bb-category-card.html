<a class="bb-card bb-topic-card bb-card-link" href="{{ '/tools/Brain-Bugs/topics/' | append: include.slug | append: '/' | relative_url }}">
  <p class="bb-subtitle mb-2">{{ include.category.technical_title }}</p>
  <h3 class="bb-card-title h4 mb-2">{{ include.category.simple_title }}</h3>
  <p class="mb-3">{{ include.category.card_summary }}</p>
  <p class="mb-3 bb-muted">{{ include.error_count }} lessons{% if include.comparison_count and include.comparison_count > 0 %} and {{ include.comparison_count }} comparisons{% endif %}</p>
  <span class="bb-chip">Open topic</span>
</a>
