<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Maps | Wizardawn Converted</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-world-maps/styles.css?v=20260224f" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">World Maps</h1>
      <p class="text-muted mb-0">Generate a randomized world or underworld hex map with configurable style, climate, borders, and map information.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-5">
            <label for="mapName" class="form-label">World Name</label>
            <input id="mapName" name="mapName" type="text" class="form-control" placeholder="optional">
          </div>
          <div class="col-md-4">
            <label for="mapStyle" class="form-label">Map Style</label>
            <select id="mapStyle" name="mapStyle" class="form-select">
              <option>Fantasy</option>
              <option>Post-Apocalyptic</option>
              <option>Exodus Spaceship</option>
              <option>Sci-Fi</option>
              <option>Post-Apocalyptic Fantasy</option>
              <option>Empty</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="climate" class="form-label">Climate</label>
            <select id="climate" name="climate" class="form-select">
              <option value="1">Cold North &amp; Warm South</option>
              <option value="2">Warm North &amp; Cold South</option>
              <option value="10">Cold North &amp; South</option>
              <option value="11">Warm North &amp; South</option>
              <option value="3">Snow</option>
              <option value="4">Desert</option>
              <option value="5">Forest</option>
              <option value="6">Jungle</option>
              <option value="7">Tropics</option>
              <option value="8">Lifeless</option>
              <option value="12">Underworld</option>
              <option value="9">Random</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="mapWide" class="form-label">Width (x10)</label>
            <input id="mapWide" name="mapWide" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="mapHigh" class="form-label">Height (x8)</label>
            <input id="mapHigh" name="mapHigh" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="hexMiles" class="form-label">Hex Miles</label>
            <input id="hexMiles" name="hexMiles" type="number" min="5" max="500" value="30" class="form-control">
          </div>

          <div class="col-12 d-flex flex-wrap gap-3">
            <div class="form-check"><input class="form-check-input" type="checkbox" id="colorMap" name="colorMap" value="1"><label class="form-check-label" for="colorMap">Color map</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="highlightLandmarks" name="highlightLandmarks" value="1"><label class="form-check-label" for="highlightLandmarks">Highlight landmarks</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="showInfo" name="showInfo" value="1" checked><label class="form-check-label" for="showInfo">Information</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="showLegend" name="showLegend" value="1" checked><label class="form-check-label" for="showLegend">Legend</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="outerHull" name="outerHull" value="1"><label class="form-check-label" for="outerHull">Outer hull</label></div>
          </div>

          <div class="col-md-3">
            <label for="northBorder" class="form-label">North Border</label>
            <select id="northBorder" name="northBorder" class="form-select">
              <option value="0">None</option>
              <option value="2">Mountains</option>
              <option value="1">Water</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="southBorder" class="form-label">South Border</label>
            <select id="southBorder" name="southBorder" class="form-select">
              <option value="0">None</option>
              <option value="2">Mountains</option>
              <option value="1">Water</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="eastBorder" class="form-label">East Border</label>
            <select id="eastBorder" name="eastBorder" class="form-select">
              <option value="0">None</option>
              <option value="2">Mountains</option>
              <option value="1">Water</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="westBorder" class="form-label">West Border</label>
            <select id="westBorder" name="westBorder" class="form-select">
              <option value="0">None</option>
              <option value="2">Mountains</option>
              <option value="1">Water</option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-world-maps/app.js"></script>
</body>
</html>
