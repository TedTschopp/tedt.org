<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sci-Fi Enemies | Wizardawn Converted</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-sci-fi-enemies/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Sci-Fi Enemies</h1>
      <p class="text-muted mb-0">Generate random robots and mutants/aliens for sci-fi and post-apocalyptic campaigns.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Mutant Future" selected>Mutant Future</option>
              <option value="Space Ryft">Space Ryft</option>
              <option value="Broken Urthe">Broken Urthe</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="r-amount" class="form-label">Robots</label>
            <input id="r-amount" name="robots" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="m-amount" class="form-label">Mutants/Aliens</label>
            <input id="m-amount" name="mutants" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-3">
            <label for="terrain" class="form-label">Terrain</label>
            <select id="terrain" name="terrain" class="form-select">
              <option value="">Any</option>
              <option value="deserts">Desert</option>
              <option value="forests">Forest</option>
              <option value="hills">Hills</option>
              <option value="jungles">Jungles</option>
              <option value="mountains">Mountains</option>
              <option value="plains & grasslands">Plains &amp; Grasslands</option>
              <option value="snow & icy regions">Snow &amp; Icy Regions</option>
              <option value="swamps & marshes">Swamps &amp; Marshes</option>
              <option value="rivers & lakes">Rivers &amp; Lakes</option>
              <option value="oceans">Oceans</option>
              <option value="underground areas">Underground Areas</option>
              <option value="wastelands">Wastelands</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-sci-fi-enemies/app.js"></script>
</body>
</html>
