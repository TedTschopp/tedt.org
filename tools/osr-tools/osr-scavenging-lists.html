<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scavenging Lists | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-scavenging-lists/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Scavenging Lists</h1>
      <p class="text-muted mb-0">Create building and corpse scavenging item lists for post-apocalyptic and horror play.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Mutant Future" selected>Mutant Future</option>
              <option value="Millenniums &amp; Mutations">Millenniums &amp; Mutations</option>
              <option value="Gamma World">Gamma World</option>
              <option value="Metamorphosis Alpha">Metamorphosis Alpha</option>
              <option value="Broken Urthe">Broken Urthe</option>
              <option value="Post-Apocalyptic">Post-Apocalyptic</option>
              <option value="Rifts">Rifts</option>
              <option value="Necropalyx">Necropalyx</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="building" class="form-label">Building</label>
            <select id="building" name="building" class="form-select">
              <option value="random" selected>Random</option>
              <option value="book_store">Book Store</option>
              <option value="cloth_store">Clothing Store</option>
              <option value="dept_store">Department Store</option>
              <option value="electric_store">Electronics Store</option>
              <option value="fire_station">Fire Station</option>
              <option value="gas_store">Gas Station/Convenient Store</option>
              <option value="generic">Generic Building</option>
              <option value="food_store">Grocery Store</option>
              <option value="tool_store">Hardware Store</option>
              <option value="home">Home</option>
              <option value="hospital">Hospital/Pharmacy</option>
              <option value="army_base">Military Base/Army Surplus Store</option>
              <option value="police_station">Police Station</option>
              <option value="restaurant">Restaurant</option>
              <option value="sport_store">Sporting Goods Store</option>
              <option value="toy_store">Toy Store</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="sets" class="form-label">Building Sets</label>
            <input id="sets" name="sets" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="amount1" class="form-label">Items Min</label>
            <input id="amount1" name="amount1" type="number" min="1" max="100" value="5" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="amount2" class="form-label">Items Max</label>
            <input id="amount2" name="amount2" type="number" min="1" max="100" value="12" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="csets" class="form-label">Corpses</label>
            <input id="csets" name="csets" type="number" min="0" max="100" value="0" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="camount1" class="form-label">Corpse Min</label>
            <input id="camount1" name="camount1" type="number" min="1" max="20" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="camount2" class="form-label">Corpse Max</label>
            <input id="camount2" name="camount2" type="number" min="1" max="20" value="5" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input id="condition" name="condition" type="checkbox" value="1" class="form-check-input">
              <label for="condition" class="form-check-label">Condition Items</label>
            </div>
          </div>
          <div class="col-md-2">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-scavenging-lists/app.js"></script>
</body>
</html>
