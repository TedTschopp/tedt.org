<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Random Treasure | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-random-treasure/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Random Treasure</h1>
      <p class="text-muted mb-0">Create batches of treasure sets with valuables/relic weighting, list mode, and system-specific options.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option>Labyrinth Lord</option>
              <option>OSRIC</option>
              <option>AD&D</option>
              <option>BD&D</option>
              <option>BFRPG</option>
              <option>Swords &amp; Wizardry</option>
              <option>Swords &amp; Six-Siders</option>
              <option>Tunnels &amp; Trolls 5th Edition</option>
              <option>Tunnels &amp; Trolls 7th Edition</option>
              <option>Tunnels &amp; Trolls Deluxe</option>
              <option>Mutant Future</option>
              <option>Gamma World</option>
              <option>Metamorphosis Alpha</option>
              <option>Broken Urthe</option>
              <option>Data</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="amount" class="form-label">Quantity</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="10" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="minItems" class="form-label">Minimum</label>
            <input id="minItems" name="minItems" type="number" min="1" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="maxItems" class="form-label">Maximum</label>
            <input id="maxItems" name="maxItems" type="number" min="1" max="100" value="4" class="form-control">
          </div>

          <div class="col-md-3">
            <label for="lootType" class="form-label">Type</label>
            <select id="lootType" name="lootType" class="form-select">
              <option value="0">Valuables &amp; Relics</option>
              <option value="2">Valuables</option>
              <option value="1">Relics</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="whichMagic" class="form-label">Game Magic %</label>
            <input id="whichMagic" name="whichMagic" type="number" min="0" max="100" value="50" class="form-control">
          </div>
          <div class="col-md-6 d-flex flex-wrap align-items-end gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="listMode" name="listMode" value="1">
              <label class="form-check-label" for="listMode">List mode</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="conditionItems" name="conditionItems" value="1">
              <label class="form-check-label" for="conditionItems">Condition items (PA games)</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="includeUa" name="includeUa" value="1">
              <label class="form-check-label" for="includeUa">Include Unearthed Arcana</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="includeAec" name="includeAec" value="1">
              <label class="form-check-label" for="includeAec">Include AEC</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="ttMagestykc" name="ttMagestykc" value="1">
              <label class="form-check-label" for="ttMagestykc">T&amp;T Magestykc items</label>
            </div>
          </div>

          <div class="col-12" id="data-source-group">
            <label for="dataSource" class="form-label">Data Source (for Data mode)</label>
            <textarea id="dataSource" name="dataSource" class="form-control" rows="4" placeholder="One treasure entry per line"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-random-treasure/app.js"></script>
</body>
</html>
