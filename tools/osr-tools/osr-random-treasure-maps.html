<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Random Treasure Maps | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-random-treasure-maps/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Random Treasure Maps</h1>
      <p class="text-muted mb-0">Generate random treasure map descriptions ranked by level.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-2">
            <label for="amount" class="form-label">Quantity</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="level" class="form-label">Level</label>
            <input id="level" name="level" type="text" value="Random" class="form-control" placeholder="1-20 or random">
          </div>
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="OSRIC">OSRIC</option>
              <option value="Labyrinth Lord" selected>Labyrinth Lord</option>
              <option value="Swords & Wizardry">Swords & Wizardry</option>
              <option value="Swords & Six-Siders">Swords & Six-Siders</option>
              <option value="BFRPG">BFRPG</option>
              <option value="BD&D">BD&D</option>
              <option value="AD&D">AD&D</option>
              <option value="Tunnels & Trolls 5th Edition">Tunnels & Trolls 5th Edition</option>
              <option value="Tunnels & Trolls 7th Edition">Tunnels & Trolls 7th Edition</option>
              <option value="Tunnels & Trolls Deluxe">Tunnels & Trolls Deluxe</option>
              <option value="Data">Data</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="which-magic" class="form-label">Magic Source % (Game)</label>
            <input id="which-magic" name="whichMagic" type="number" min="0" max="100" value="50" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>

          <div class="col-md-4 d-flex align-items-end"><div class="form-check"><input id="ua" name="ua" type="checkbox" value="1" class="form-check-input"><label for="ua" class="form-check-label">Include Unearthed Arcana (AD&D)</label></div></div>
          <div class="col-md-4 d-flex align-items-end"><div class="form-check"><input id="aec" name="aec" type="checkbox" value="1" class="form-check-input"><label for="aec" class="form-check-label">Include AEC (Labyrinth Lord)</label></div></div>
          <div class="col-md-4 d-flex align-items-end"><div class="form-check"><input id="oldway" name="oldway" type="checkbox" value="1" class="form-check-input"><label for="oldway" class="form-check-label">Use Magestykc items for T&T</label></div></div>

          <div class="col-12">
            <label for="data" class="form-label">Data (for Data game; optional lines with prefixes `loot:`, `magic:`, `trap:`)</label>
            <textarea id="data" name="data" rows="4" class="form-control" placeholder="loot: moon-etched chalice\nmagic: staff of sparks\ntrap: pressure dart trap"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-random-treasure-maps/app.js"></script>
</body>
</html>
