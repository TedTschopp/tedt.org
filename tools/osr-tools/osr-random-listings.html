<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Random Listings | Wizardawn Converted</title>
  <link rel="stylesheet" href="/tools/lib/tedt-org-tools.css">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-random-listings/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Random Listings</h1>
      <p class="text-muted mb-0">Generate list-oriented data snippets for containers, decorations, traps, and treasure sets across fantasy, post-apocalyptic, sci-fi, and T&amp;T variants.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-4">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-5">
            <label for="listType" class="form-label">Category</label>
            <select id="listType" name="listType" class="form-select">
              <option>Dungeon Containers</option>
              <option>Dungeon Decorations</option>
              <option>Dungeon Traps</option>
              <option>Dungeon Treasure (3 Denominations)</option>
              <option>Dungeon Treasure (5 Denominations)</option>
              <option>Post-Apocalyptic Containers</option>
              <option>Post-Apocalyptic Decorations</option>
              <option>Post-Apocalyptic Traps</option>
              <option>Post-Apocalyptic Treasure</option>
              <option>Sci-Fi Containers</option>
              <option>Sci-Fi Decorations</option>
              <option>Sci-Fi Traps</option>
              <option>Sci-Fi Treasure</option>
              <option>T&amp;T 5e Containers</option>
              <option>T&amp;T 5e Decorations</option>
              <option>T&amp;T 5e Traps</option>
              <option>T&amp;T 5e Treasure (Original Weapons/Armor)</option>
              <option>T&amp;T 5e Treasure (Simple Weapons/Armor)</option>
              <option>T&amp;T 7e/Deluxe Containers</option>
              <option>T&amp;T 7e/Deluxe Decorations</option>
              <option>T&amp;T 7e/Deluxe Traps</option>
              <option>T&amp;T 7e Treasure (Original Weapons/Armor)</option>
              <option>T&amp;T 7e Treasure (Simple Weapons/Armor)</option>
              <option>T&amp;T Deluxe Treasure</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="amount" class="form-label">Amount</label>
            <input id="amount" name="amount" type="number" min="10" max="1000" value="100" class="form-control">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-random-listings/app.js"></script>
</body>
</html>
