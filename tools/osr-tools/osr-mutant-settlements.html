<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mutant Settlements | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-mutant-settlements/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Mutant Settlements</h1>
      <p class="text-muted mb-0">Generate mutant settlements with citizens, businesses, and officials.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Mutant Future" selected>Mutant Future</option>
              <option value="Broken Urthe">Broken Urthe</option>
              <option value="Gamma World">Gamma World</option>
              <option value="Metamorphosis Alpha">Metamorphosis Alpha</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="name" class="form-label">Settlement Name</label>
            <input id="name" name="name" type="text" class="form-control" placeholder="optional">
          </div>
          <div class="col-md-2">
            <label for="map-style" class="form-label">Map Style</label>
            <select id="map-style" name="mapStyle" class="form-select">
              <option value="0" selected>New City</option>
              <option value="2">New Village</option>
              <option value="1">Ruined City</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="money" class="form-label">Currency</label>
            <input id="money" name="money" type="text" value="gold" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>

          <div class="col-md-2">
            <label for="map-wide" class="form-label">Map Width</label>
            <input id="map-wide" name="mapWide" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="map-high" class="form-label">Map Height</label>
            <input id="map-high" name="mapHigh" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-3">
            <label for="map-rooms" class="form-label">My Map's Buildings</label>
            <input id="map-rooms" name="mapRooms" type="number" min="0" max="1000" value="0" class="form-control">
          </div>

          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="populate" name="populate" type="checkbox" value="1" class="form-check-input" checked><label for="populate" class="form-check-label">Populate</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="dress" name="dress" type="checkbox" value="1" class="form-check-input" checked><label for="dress" class="form-check-label">Dress Citizens</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="possessions" name="possessions" type="checkbox" value="1" class="form-check-input" checked><label for="possessions" class="form-check-label">Carry Items</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="dose" name="dose" type="checkbox" value="1" class="form-check-input"><label for="dose" class="form-check-label">More Mutated</label></div></div>

          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="stores" name="stores" type="checkbox" value="1" class="form-check-input" checked><label for="stores" class="form-check-label">Create Stores</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="shelf" name="shelf" type="checkbox" value="1" class="form-check-input" checked><label for="shelf" class="form-check-label">Limited Stock</label></div></div>
          <div class="col-md-2">
            <label for="stock" class="form-label">Stock %</label>
            <input id="stock" name="stock" type="number" min="5" max="100" step="5" value="70" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="techy" class="form-label">Store Tech</label>
            <select id="techy" name="techy" class="form-select">
              <option value="0" selected>High/Low Tech</option>
              <option value="1">Low Tech</option>
              <option value="2">High Tech</option>
            </select>
          </div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="law" name="law" type="checkbox" value="1" class="form-check-input" checked><label for="law" class="form-check-label">Officials</label></div></div>

          <div class="col-md-2">
            <label for="might1" class="form-label">Stamina Dice (dX)</label>
            <input id="might1" name="might1" type="number" min="1" max="10" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="might2" class="form-label">Stamina Die Size</label>
            <input id="might2" name="might2" type="number" min="4" max="20" value="8" class="form-control">
          </div>

          <div class="col-12"><hr class="my-1"></div>
          <div class="col-12"><label class="form-label">Inhabitants</label></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-human" name="speciesHuman" type="checkbox" value="1" class="form-check-input" checked><label for="species-human" class="form-check-label">Humans</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-mhuman" name="speciesMhuman" type="checkbox" value="1" class="form-check-input" checked><label for="species-mhuman" class="form-check-label">Mutant Humans</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-insect" name="speciesInsect" type="checkbox" value="1" class="form-check-input" checked><label for="species-insect" class="form-check-label">Humanoid Insects</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-animal" name="speciesAnimal" type="checkbox" value="1" class="form-check-input" checked><label for="species-animal" class="form-check-label">Humanoid Animals</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-plant" name="speciesPlant" type="checkbox" value="1" class="form-check-input" checked><label for="species-plant" class="form-check-label">Humanoid Plants</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="species-robot" name="speciesRobot" type="checkbox" value="1" class="form-check-input" checked><label for="species-robot" class="form-check-label">Robots</label></div></div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-mutant-settlements/app.js"></script>
</body>
</html>
