<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>The Dungeon Door | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-the-dungeon-door/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">The Dungeon Door</h1>
      <p class="text-muted mb-0">Generate reference tables for encounters, traps, treasure, and dungeon-support tools for fast play.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option>Labyrinth Lord</option>
              <option>OSRIC</option>
              <option>AD&D</option>
              <option>BD&D</option>
              <option>BFRPG</option>
              <option>Swords &amp; Wizardry</option>
              <option>Swords &amp; Six-Siders</option>
              <option>Tunnels &amp; Trolls 5th Edition</option>
              <option>Tunnels &amp; Trolls 7th Edition</option>
              <option>Tunnels &amp; Trolls Deluxe</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="level" class="form-label">Dungeon Level</label>
            <input id="level" name="level" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="magicPercent" class="form-label">Game Magic %</label>
            <input id="magicPercent" name="magicPercent" type="number" min="0" max="100" value="50" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="ttDifficulty" class="form-label">T&amp;T Difficulty</label>
            <select id="ttDifficulty" name="ttDifficulty" class="form-select">
              <option value="9">Easy</option>
              <option value="1" selected>Normal</option>
              <option value="2">Challenging</option>
              <option value="3">Difficult</option>
              <option value="4">Heroic</option>
              <option value="5">Epic</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label mb-1">Game Source Options</label>
            <div class="d-flex flex-wrap gap-3">
              <div class="form-check"><input class="form-check-input" type="checkbox" id="optMom" name="optMom" value="1"><label class="form-check-label" for="optMom">OSRIC: Monster of Myth</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="optFf" name="optFf" value="1"><label class="form-check-label" for="optFf">AD&amp;D: Fiend Folio</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="optMm2" name="optMm2" value="1"><label class="form-check-label" for="optMm2">AD&amp;D: Monster Manual II</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="optUa" name="optUa" value="1"><label class="form-check-label" for="optUa">AD&amp;D: Unearthed Arcana</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="optAec" name="optAec" value="1"><label class="form-check-label" for="optAec">Labyrinth Lord: AEC</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="ttMagestykc" name="ttMagestykc" value="1"><label class="form-check-label" for="ttMagestykc">T&amp;T: Magestykc Weapons/Armor</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showDescribe" name="showDescribe" value="1" checked><label class="form-check-label" for="showDescribe">Show descriptions</label></div>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label mb-1">Include Sections</label>
            <div class="door-grid">
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showRules" name="showRules" value="1"><label class="form-check-label" for="showRules">Rules</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showMundane" name="showMundane" value="1" checked><label class="form-check-label" for="showMundane">Mundane Items</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showUnusual" name="showUnusual" value="1" checked><label class="form-check-label" for="showUnusual">Unusual Items</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showRoomTraps" name="showRoomTraps" value="1" checked><label class="form-check-label" for="showRoomTraps">Room Traps</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showContainers" name="showContainers" value="1" checked><label class="form-check-label" for="showContainers">Containers</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showContainerTraps" name="showContainerTraps" value="1" checked><label class="form-check-label" for="showContainerTraps">Container Traps</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showCurses" name="showCurses" value="1" checked><label class="form-check-label" for="showCurses">Curses</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showCoinGem" name="showCoinGem" value="1" checked><label class="form-check-label" for="showCoinGem">Coins, Gems &amp; Jewels</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showExceptional" name="showExceptional" value="1" checked><label class="form-check-label" for="showExceptional">Exceptional Items</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showHoards" name="showHoards" value="1" checked><label class="form-check-label" for="showHoards">Treasure Hoards</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="showEncounters" name="showEncounters" value="1" checked><label class="form-check-label" for="showEncounters">Encounters</label></div>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-the-dungeon-door/app.js"></script>
</body>
</html>
