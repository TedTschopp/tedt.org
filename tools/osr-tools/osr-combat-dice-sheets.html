<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Combat Dice Sheets | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-combat-dice-sheets/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Combat Dice Sheets</h1>
      <p class="text-muted mb-0">Pre-roll Tunnels &amp; Trolls combat dice sets across a configurable range for faster play at the table.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-2">
            <label for="dice-min" class="form-label">Minimum Dice</label>
            <input id="dice-min" name="dice_min" type="number" min="1" max="1000" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="dice-max" class="form-label">Maximum Dice</label>
            <input id="dice-max" name="dice_max" type="number" min="1" max="1000" value="10" class="form-control">
          </div>
          <div class="col-md-3">
            <label for="sets-per" class="form-label">Sets Per Dice Amount</label>
            <input id="sets-per" name="dice_num" type="number" min="1" max="500" value="10" class="form-control">
          </div>
          <div class="col-md-3">
            <label for="tt-version" class="form-label">T&T Version</label>
            <select id="tt-version" name="tt_vs" class="form-select">
              <option value="5">T&T 5e</option>
              <option value="7" selected>T&T 7e</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-combat-dice-sheets/app.js"></script>
</body>
</html>
