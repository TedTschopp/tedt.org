<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fantasy Settlements | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-fantasy-settlements/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Fantasy Settlements</h1>
      <p class="text-muted mb-0">Generate fantasy settlements with race-aware population and civic institutions.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-2">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Fantasy" selected>Fantasy</option>
              <option value="OSRIC">OSRIC</option>
              <option value="AD&D">AD&D</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="name" class="form-label">Settlement Name</label>
            <input id="name" name="name" type="text" class="form-control" placeholder="optional">
          </div>
          <div class="col-md-2">
            <label for="built" class="form-label">Map Type</label>
            <select id="built" name="built" class="form-select">
              <option value="City" selected>City</option>
              <option value="Keep">Keep</option>
              <option value="Village">Village</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="map-wide" class="form-label">Map Width</label>
            <input id="map-wide" name="mapWide" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="map-high" class="form-label">Map Height</label>
            <input id="map-high" name="mapHigh" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-1">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>

          <div class="col-md-3">
            <label for="map-rooms" class="form-label">My Map's Buildings</label>
            <input id="map-rooms" name="mapRooms" type="number" min="0" max="1000" value="0" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="populate" name="populate" type="checkbox" value="1" class="form-check-input"><label for="populate" class="form-check-label">Populate</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="rulers" name="rulers" type="checkbox" value="1" class="form-check-input" checked><label for="rulers" class="form-check-label">Rulers</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="stores" name="stores" type="checkbox" value="1" class="form-check-input" checked><label for="stores" class="form-check-label">Merchants</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="guilds" name="guilds" type="checkbox" value="1" class="form-check-input" checked><label for="guilds" class="form-check-label">Guilds</label></div></div>
          <div class="col-md-1 d-flex align-items-end"><div class="form-check"><input id="police" name="police" type="checkbox" value="1" class="form-check-input" checked><label for="police" class="form-check-label">Guards</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="church" name="church" type="checkbox" value="1" class="form-check-input" checked><label for="church" class="form-check-label">Churches</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="water" name="water" type="checkbox" value="1" class="form-check-input" checked><label for="water" class="form-check-label">Sea Side</label></div></div>

          <div class="col-md-2">
            <label for="stock" class="form-label">Stock %</label>
            <input id="stock" name="stock" type="number" min="5" max="100" step="5" value="70" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="shelf" name="shelf" type="checkbox" value="1" class="form-check-input" checked><label for="shelf" class="form-check-label">Limited Stock</label></div></div>

          <div class="col-12">
            <label for="race-list" class="form-label">Settlement Races (comma-separated, leave blank for full default set)</label>
            <input id="race-list" name="raceList" type="text" class="form-control" placeholder="Human, Elf, Dwarf, Gnome, Halfling">
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-fantasy-settlements/app.js"></script>
</body>
</html>
