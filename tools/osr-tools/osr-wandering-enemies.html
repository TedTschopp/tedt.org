<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wandering Enemies | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-wandering-enemies/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Wandering Enemies</h1>
      <p class="text-muted mb-0">Generate random encounter table entries by game, level, terrain, and source options.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option>Labyrinth Lord</option>
              <option>OSRIC</option>
              <option>AD&D</option>
              <option>BD&D</option>
              <option>BFRPG</option>
              <option>Swords &amp; Wizardry</option>
              <option>Swords &amp; Six-Siders</option>
              <option>Tunnels &amp; Trolls 5th Edition</option>
              <option>Tunnels &amp; Trolls 7th Edition</option>
              <option>Tunnels &amp; Trolls Deluxe</option>
              <option>Mutant Future</option>
              <option>Gamma World</option>
              <option>Metamorphosis Alpha</option>
              <option>Broken Urthe</option>
              <option>Data</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="level" class="form-label">Level</label>
            <input id="level" name="level" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="amount" class="form-label">Quantity</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="12" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="ttDifficulty" class="form-label">T&amp;T Difficulty</label>
            <select id="ttDifficulty" name="ttDifficulty" class="form-select">
              <option value="9">Easy</option>
              <option value="1" selected>Normal</option>
              <option value="2">Challenging</option>
              <option value="3">Difficult</option>
              <option value="4">Heroic</option>
              <option value="5">Epic</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="terrain" class="form-label">Terrain</label>
            <select id="terrain" name="terrain" class="form-select">
              <option value="">Any</option>
              <option value="DG">Dungeon / Ruins / Interior</option>
              <option value="TW">Settlement</option>
              <option value="RD">Wastelands / Harsh Lands</option>
              <option value="PF">Forest</option>
              <option value="PH">Hills</option>
              <option value="PM">Mountains</option>
              <option value="PP">Plains</option>
              <option value="PS">Swamp</option>
              <option value="PD">Desert</option>
              <option value="FW">Freshwater</option>
              <option value="SW">Sea</option>
              <option value="CF">Snowy Forest</option>
              <option value="CH">Snowy Hills</option>
              <option value="CM">Snowy Mountains</option>
              <option value="CP">Snowy Plains</option>
              <option value="TF">Jungle Forest</option>
              <option value="TH">Jungle Hills</option>
              <option value="TM">Jungle Mountains</option>
              <option value="TS">Jungle Swamp</option>
              <option value="VG">Settlement (BD&amp;D)</option>
              <option value="LW">Lost World (BD&amp;D)</option>
            </select>
          </div>

          <div class="col-md-8 d-flex flex-wrap align-items-end gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optMom" name="optMom" value="1">
              <label class="form-check-label" for="optMom">OSRIC: Monsters of Myth</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optFf" name="optFf" value="1">
              <label class="form-check-label" for="optFf">AD&amp;D: Fiend Folio</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optMm2" name="optMm2" value="1">
              <label class="form-check-label" for="optMm2">AD&amp;D: Monster Manual II</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optAec" name="optAec" value="1">
              <label class="form-check-label" for="optAec">Labyrinth Lord: AEC</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optMutate" name="optMutate" value="1">
              <label class="form-check-label" for="optMutate">Mutated animals</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="showDescribe" name="showDescribe" value="1" checked>
              <label class="form-check-label" for="showDescribe">Show descriptions</label>
            </div>
          </div>

          <div class="col-md-2" id="data-code-group">
            <label for="dataCode" class="form-label">Data Terrain Code</label>
            <input id="dataCode" name="dataCode" type="text" maxlength="3" class="form-control" placeholder="e.g., DG">
          </div>
          <div class="col-12" id="data-source-group">
            <label for="dataSource" class="form-label">Data Source (Data mode)</label>
            <textarea id="dataSource" name="dataSource" class="form-control" rows="4" placeholder="Use one enemy per line; 'name^^^meta' entries are supported"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-wandering-enemies/app.js"></script>
</body>
</html>
