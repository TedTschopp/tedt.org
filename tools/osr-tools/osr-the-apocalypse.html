<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>The Apocalypse | Wizardawn Converted</title>
  <script>(function(){var s=document.createElement('script');s.src=location.protocol==='file:'?'file://'+location.pathname.split('/tools/')[0]+'/tools/lib/tedt-org-tools-loader.js':'/tools/lib/tedt-org-tools-loader.js';document.head.appendChild(s);}());</script>
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-the-apocalypse/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">The Apocalypse</h1>
      <p class="text-muted mb-0">Generate apocalypse reference tables for solitaire play or GM prep.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Mutant Future" selected>Mutant Future</option>
              <option value="Broken Urthe">Broken Urthe</option>
              <option value="Gamma World">Gamma World</option>
              <option value="Metamorphosis Alpha">Metamorphosis Alpha</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="level" class="form-label">Adventure Level</label>
            <input id="level" name="level" type="number" min="1" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="mutants-only" name="mutantsOnly" type="checkbox" value="1" class="form-check-input"><label for="mutants-only" class="form-check-label">Mutants Only</label></div></div>
          <div class="col-md-2">
            <label for="money" class="form-label">Currency</label>
            <input id="money" name="money" type="text" value="gold" class="form-control">
          </div>
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>

          <div class="col-12"><hr class="my-1"></div>

          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-rules" name="showRules" type="checkbox" value="1" class="form-check-input"><label for="show-rules" class="form-check-label">Rules</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-mundane" name="showMundane" type="checkbox" value="1" class="form-check-input" checked><label for="show-mundane" class="form-check-label">Mundane Items</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-room-traps" name="showRoomTraps" type="checkbox" value="1" class="form-check-input" checked><label for="show-room-traps" class="form-check-label">Room Traps</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-containers" name="showContainers" type="checkbox" value="1" class="form-check-input" checked><label for="show-containers" class="form-check-label">Containers</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-container-traps" name="showContainerTraps" type="checkbox" value="1" class="form-check-input" checked><label for="show-container-traps" class="form-check-label">Container Traps</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-money" name="showMoney" type="checkbox" value="1" class="form-check-input" checked><label for="show-money" class="form-check-label">Money</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-exceptional" name="showExceptional" type="checkbox" value="1" class="form-check-input" checked><label for="show-exceptional" class="form-check-label">Exceptional Items</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-hoards" name="showHoards" type="checkbox" value="1" class="form-check-input" checked><label for="show-hoards" class="form-check-label">Hoards</label></div></div>
          <div class="col-md-2 d-flex align-items-end"><div class="form-check"><input id="show-encounters" name="showEncounters" type="checkbox" value="1" class="form-check-input" checked><label for="show-encounters" class="form-check-label">Encounters</label></div></div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-the-apocalypse/app.js"></script>
</body>
</html>
