<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Adventuring Gear | Wizardawn Converted</title>
  <link rel="stylesheet" href="/tools/lib/tedt-org-tools.css">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-adventuring-gear/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Adventuring Gear</h1>
      <p class="text-muted mb-0">Generate random fantasy adventuring gear packs.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-4">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Fantasy" selected>Fantasy</option>
              <option value="Labyrinth Lord">Labyrinth Lord</option>
              <option value="OSRIC">OSRIC</option>
              <option value="AD&D">AD&D</option>
              <option value="BFRPG">BFRPG</option>
              <option value="BD&D">BD&D</option>
              <option value="Swords &amp; Wizardry">Swords &amp; Wizardry</option>
              <option value="Swords &amp; Six-Siders">Swords &amp; Six-Siders</option>
              <option value="Tunnels &amp; Trolls 5th Edition">Tunnels &amp; Trolls 5th Edition</option>
              <option value="Tunnels &amp; Trolls 7th Edition">Tunnels &amp; Trolls 7th Edition</option>
              <option value="Tunnels &amp; Trolls Deluxe">Tunnels &amp; Trolls Deluxe</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="packs" class="form-label">Packs</label>
            <input id="packs" name="packs" type="number" min="1" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
              <input id="simple-food" name="simpleFood" type="checkbox" value="1" class="form-check-input">
              <label for="simple-food" class="form-check-label">Simple Food &amp; Drink</label>
            </div>
          </div>
          <div class="col-md-2">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-adventuring-gear/app.js"></script>
</body>
</html>
