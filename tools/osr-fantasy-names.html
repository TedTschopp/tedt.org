<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fantasy Names | Wizardawn Converted</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-fantasy-names/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Fantasy Names</h1>
      <p class="text-muted mb-0">Select one or more categories and generate a batch of names for each category.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-4">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-4">
            <label for="amount" class="form-label">Names Per Category</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="10" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label mb-1">Fantasy Categories</label>
            <div class="names-grid">
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catDemon" name="category" value="demon"><label class="form-check-label" for="catDemon">Demon</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catDragon" name="category" value="dragon"><label class="form-check-label" for="catDragon">Dragon</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catDwarf" name="category" value="dwarf"><label class="form-check-label" for="catDwarf">Dwarf</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catElfF" name="category" value="elf_f"><label class="form-check-label" for="catElfF">Elf - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catElfM" name="category" value="elf_m"><label class="form-check-label" for="catElfM">Elf - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catDarkElfF" name="category" value="delf_f"><label class="form-check-label" for="catDarkElfF">Dark Elf - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catDarkElfM" name="category" value="delf_m"><label class="form-check-label" for="catDarkElfM">Dark Elf - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catFairy" name="category" value="fairy"><label class="form-check-label" for="catFairy">Fairy</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catCatF" name="category" value="catf"><label class="form-check-label" for="catCatF">Feline Humanoid - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catCatM" name="category" value="catm"><label class="form-check-label" for="catCatM">Feline Humanoid - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catFemale" name="category" value="female"><label class="form-check-label" for="catFemale">Generic - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catMale" name="category" value="male"><label class="form-check-label" for="catMale">Generic - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catGeneric" name="category" value="generic"><label class="form-check-label" for="catGeneric">Generic</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catGnome" name="category" value="gnome"><label class="form-check-label" for="catGnome">Gnome</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catGoblin" name="category" value="goblin"><label class="form-check-label" for="catGoblin">Goblin</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catHolmF" name="category" value="holm_f"><label class="form-check-label" for="catHolmF">Holmesian - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catHolmM" name="category" value="holm_m"><label class="form-check-label" for="catHolmM">Holmesian - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catHumanF" name="category" value="human_f"><label class="form-check-label" for="catHumanF">Human - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catHumanM" name="category" value="human_m"><label class="form-check-label" for="catHumanM">Human - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catImp" name="category" value="imp"><label class="form-check-label" for="catImp">Imp</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catLizard" name="category" value="lizardman"><label class="form-check-label" for="catLizard">Lizardman</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catOrc" name="category" value="orc"><label class="form-check-label" for="catOrc">Orc</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catRat" name="category" value="ratman"><label class="form-check-label" for="catRat">Ratman</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catSpell" name="category" value="spell"><label class="form-check-label" for="catSpell">Spell</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catTavern" name="category" value="tavern"><label class="form-check-label" for="catTavern">Tavern</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catVillage" name="category" value="village"><label class="form-check-label" for="catVillage">Village</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catWizard" name="category" value="wizard"><label class="form-check-label" for="catWizard">Wizard</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catWolf" name="category" value="wolf"><label class="form-check-label" for="catWolf">Wolfen Humanoid</label></div>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label mb-1">Hyborian Categories</label>
            <div class="names-grid">
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catAqm" name="category" value="hb_aqm"><label class="form-check-label" for="catAqm">Aquilonian - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catCim" name="category" value="hb_cim"><label class="form-check-label" for="catCim">Cimmerian - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catStm" name="category" value="hb_stm"><label class="form-check-label" for="catStm">Stygian - Male</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catAqf" name="category" value="hb_aqf"><label class="form-check-label" for="catAqf">Aquilonian - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catCif" name="category" value="hb_cif"><label class="form-check-label" for="catCif">Cimmerian - Female</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" id="catStf" name="category" value="hb_stf"><label class="form-check-label" for="catStf">Stygian - Female</label></div>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-fantasy-names/app.js"></script>
</body>
</html>
