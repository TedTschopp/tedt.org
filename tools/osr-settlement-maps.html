<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Settlement Maps | Wizardawn Converted</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-settlement-maps/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Settlement Maps</h1>
      <p class="text-muted mb-0">Generate random city, keep, or village layouts with optional keyed building numbering.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="settlement-type" class="form-label">Settlement Type</label>
            <select id="settlement-type" name="type" class="form-select">
              <option value="City" selected>City</option>
              <option value="Keep">Keep</option>
              <option value="Village">Village</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="map-wide" class="form-label">Width</label>
            <input id="map-wide" name="map_wide" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="map-high" class="form-label">Height</label>
            <input id="map-high" name="map_high" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input id="keyed" name="keyed" type="checkbox" value="1" class="form-check-input" checked>
              <label for="keyed" class="form-check-label">Number Areas</label>
            </div>
          </div>
          <div class="col-md-3">
            <label for="map-numbers" class="form-label">Start Number</label>
            <input id="map-numbers" name="map_numbers" type="number" min="1" max="1000" value="1" class="form-control">
          </div>
          <div class="col-md-6">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-settlement-maps/app.js"></script>
</body>
</html>
