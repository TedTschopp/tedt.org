<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dungeon Maps | Wizardawn Converted</title>
  <link rel="stylesheet" href="/tools/lib/tedt-org-tools.css">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-dungeon-maps/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Dungeon Maps</h1>
      <p class="text-muted mb-0">Generate random cavernous, dungeon, or side-view maps from curated geomorph tile sources.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="map-type" class="form-label">Map Type</label>
            <select id="map-type" name="type" class="form-select">
              <option value="cavernous dungeon" selected>Cavernous Dungeon</option>
              <option value="dungeon">Dungeon</option>
              <option value="cavernous">Cavernous</option>
              <option value="side view">Side View</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="map-wide" class="form-label">Width</label>
            <input id="map-wide" name="map_wide" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="map-high" class="form-label">Height</label>
            <input id="map-high" name="map_high" type="number" min="1" max="10" value="4" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input id="keyed" name="keyed" type="checkbox" value="1" class="form-check-input" checked>
              <label for="keyed" class="form-check-label">Number Areas</label>
            </div>
          </div>
          <div class="col-md-3">
            <label for="map-numbers" class="form-label">Start Number</label>
            <input id="map-numbers" name="map_numbers" type="number" min="1" max="1000" value="1" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label mb-2">Include Artists</label>
            <div class="d-flex flex-wrap gap-3">
              <div class="form-check"><input id="artist-dyson" name="cave_dyson" type="checkbox" value="1" class="form-check-input" checked><label for="artist-dyson" class="form-check-label">Dyson</label></div>
              <div class="form-check"><input id="artist-risus" name="cave_risus" type="checkbox" value="1" class="form-check-input" checked><label for="artist-risus" class="form-check-label">Risus</label></div>
              <div class="form-check"><input id="artist-rorsch" name="cave_rorsch" type="checkbox" value="1" class="form-check-input" checked><label for="artist-rorsch" class="form-check-label">Rorschachhamster</label></div>
              <div class="form-check"><input id="artist-stone" name="cave_stone" type="checkbox" value="1" class="form-check-input" checked><label for="artist-stone" class="form-check-label">Stonewerks</label></div>
              <div class="form-check"><input id="artist-glenn" name="cave_glenn" type="checkbox" value="1" class="form-check-input" checked><label for="artist-glenn" class="form-check-label">Glenn Jupp</label></div>
              <div class="form-check"><input id="artist-stuart" name="cave_stuart" type="checkbox" value="1" class="form-check-input" checked><label for="artist-stuart" class="form-check-label">Stuart</label></div>
              <div class="form-check"><input id="artist-zero" name="cave_zero" type="checkbox" value="1" class="form-check-input" checked><label for="artist-zero" class="form-check-label">Infinite Zer0</label></div>
            </div>
          </div>

          <div class="col-md-6">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js?v=20260224d"></script>
  <script src="./osr-support-files/shared/js/map-utils.js?v=20260224g"></script>
  <script src="./osr-dungeon-maps/app.js"></script>
</body>
</html>
