<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Encounter Creation | Wizardawn Converted</title>
  <link rel="stylesheet" href="/tools/lib/tedt-org-tools.css">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-encounter-creation/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Encounter Creation</h1>
      <p class="text-muted mb-0">Create encounter sets based on game system, party strength, selected enemy, and optional treasure.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-3">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-md-3">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option>Labyrinth Lord</option>
              <option>OSRIC</option>
              <option>AD&D</option>
              <option>BD&D</option>
              <option>BFRPG</option>
              <option>Swords &amp; Wizardry</option>
              <option>Swords &amp; Six-Siders</option>
              <option>Tunnels &amp; Trolls 5th Edition</option>
              <option>Tunnels &amp; Trolls 7th Edition</option>
              <option>Tunnels &amp; Trolls Deluxe</option>
              <option>Mutant Future</option>
              <option>Gamma World</option>
              <option>Metamorphosis Alpha</option>
              <option>Broken Urthe</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="level" class="form-label">Level</label>
            <input id="level" name="level" type="number" min="0" max="100" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="characters" class="form-label">Characters</label>
            <input id="characters" name="characters" type="number" min="1" max="20" value="4" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="amount" class="form-label">Encounters</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="5" class="form-control">
          </div>

          <div class="col-md-4">
            <label for="enemy" class="form-label">Encounter Enemy</label>
            <input id="enemy" name="enemy" type="text" class="form-control" placeholder="optional (random if blank)">
          </div>
          <div class="col-md-2">
            <label for="hitDiceType" class="form-label">S&amp;W Hit Dice</label>
            <select id="hitDiceType" name="hitDiceType" class="form-select">
              <option value="6">1d6</option>
              <option value="8" selected>1d8</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="ttDice" class="form-label">T&amp;T Dice</label>
            <input id="ttDice" name="ttDice" type="number" min="0" max="1000" value="0" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="ttAdds" class="form-label">T&amp;T Adds</label>
            <input id="ttAdds" name="ttAdds" type="number" min="0" max="1000" value="0" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="ttDifficulty" class="form-label">T&amp;T Difficulty</label>
            <select id="ttDifficulty" name="ttDifficulty" class="form-select">
              <option value="9">Easy</option>
              <option value="1" selected>Normal</option>
              <option value="2">Challenging</option>
              <option value="3">Difficult</option>
              <option value="4">Heroic</option>
              <option value="5">Epic</option>
            </select>
          </div>

          <div class="col-md-2">
            <label for="moneyName" class="form-label">Currency</label>
            <input id="moneyName" name="moneyName" type="text" class="form-control" value="gold">
          </div>
          <div class="col-md-2">
            <label for="moneyCut" class="form-label">Money Amount %</label>
            <input id="moneyCut" name="moneyCut" type="number" min="1" max="1000" value="100" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="whichMagic" class="form-label">Game Magic %</label>
            <input id="whichMagic" name="whichMagic" type="number" min="0" max="100" value="50" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="might1" class="form-label">BU HD Count</label>
            <input id="might1" name="might1" type="number" min="1" max="20" value="1" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="might2" class="form-label">BU HD Die</label>
            <input id="might2" name="might2" type="number" min="4" max="20" value="8" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="addLoot" name="addLoot" value="1">
              <label class="form-check-label" for="addLoot">Add loot</label>
            </div>
          </div>

          <div class="col-12 d-flex flex-wrap gap-3">
            <div class="form-check"><input class="form-check-input" type="checkbox" id="optMutantsOnly" name="optMutantsOnly" value="1"><label class="form-check-label" for="optMutantsOnly">Mutants only (PA)</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="optUa" name="optUa" value="1"><label class="form-check-label" for="optUa">Include UA</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="optAec" name="optAec" value="1"><label class="form-check-label" for="optAec">Include AEC</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="optTtMagestykc" name="optTtMagestykc" value="1"><label class="form-check-label" for="optTtMagestykc">T&amp;T Magestykc gear</label></div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-encounter-creation/app.js"></script>
</body>
</html>
