<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Converted Tools Launcher | Wizardawn</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <style>
    .tool-card { height: 100%; }
    .tool-link { text-decoration: none; }
  </style>
</head>
<body>
  <main class="container py-4">
    <header class="mb-4">
      <h1 class="h3 mb-1">Converted Tools Launcher</h1>
      <p class="text-muted mb-0">Open any converted Wizardawn tool from one place.</p>
    </header>

    <section class="mb-3">
      <input id="tool-search" type="search" class="form-control" placeholder="Filter tools by name, slug, or description..." aria-label="Filter tools">
    </section>

    <section>
      <div id="tool-grid" class="row g-3"></div>
      <p id="empty-state" class="text-muted mt-3 d-none">No tools match your filter.</p>
    </section>
  </main>

  <script>
    const tools = [
      { slug: 'osr-ruined-city-maps', name: 'Ruined City Maps', description: 'Generate random abandoned city maps from ruined-city geomorph tiles with optional keyed numbering.' },
      { slug: 'osr-alchemy-shelf', name: 'Alchemy Shelf', description: 'Generate items for an alchemy shelf or wizard laboratory.' },
      { slug: 'osr-random-area', name: 'Random Area', description: 'Create random areas with encounters, traps, contents, and loot.' },
      { slug: 'osr-the-apocalypse', name: 'The Apocalypse', description: 'Generate apocalypse reference tables for solitaire play or GM prep.' },
      { slug: 'osr-books-and-tomes', name: 'Books & Tomes', description: 'Generate random fantasy books and unusual magical tomes.' },
      { slug: 'osr-alchemy-recipes', name: 'Alchemy Recipes', description: 'Generate alchemy recipes and reagent price sheets by game system.' },
      { slug: 'osr-adventurers-guild-bd-and-d', name: 'Adventurers Guild (BD&D)', description: 'Generate classic BD&D-style adventurers for listings or character-sheet prep.' },
      { slug: 'osr-piles-of-coins', name: 'Piles of Coins', description: 'Generate random fantasy coin piles by game system and target gold value range.' },
      { slug: 'osr-random-listings', name: 'Random Listings', description: 'Generate list-oriented data snippets for containers, decorations, traps, and treasure sets across multiple variants.' },
      { slug: 'osr-dungeon-delve', name: 'Dungeon Delve', description: 'Create a configurable dungeon delve with room-by-room encounters, traps, loot, and atmosphere hints.' },
      { slug: 'osr-combat-dice-sheets', name: 'Combat Dice Sheets', description: 'Pre-roll Tunnels & Trolls combat dice sets across a configurable range for faster play at the table.' },
      { slug: 'osr-dungeon-maps', name: 'Dungeon Maps', description: 'Generate random cavernous, dungeon, or side-view maps from curated geomorph tile sources.' },
      { slug: 'osr-the-dungeon-door', name: 'The Dungeon Door', description: 'Generate reference tables for encounters, traps, treasure, and dungeon-support tools for fast play.' },
      { slug: 'osr-encounter-creation', name: 'Encounter Creation', description: 'Create encounter sets based on game system, party strength, selected enemy, and optional treasure.' },
      { slug: 'osr-fantasy-settlements', name: 'Fantasy Settlements', description: 'Generate fantasy settlements with race-aware population and civic institutions.' },
      { slug: 'osr-world-adventure', name: 'World Adventure', description: 'Generate one detailed world-hex adventure region with landmarks, exploration sites, hazards, and encounter-ready content.' },
      { slug: 'osr-basic-adventurers-guild', name: 'Basic Adventurers Guild', description: 'Generate Labyrinth Lord adventurers with listing or sheet-style output.' },
      { slug: 'osr-monster-listing', name: 'Monster Listing', description: 'Generate sorted monster listings by name/level, list/terrain grouping, and table/stat-block appearance.' },
      { slug: 'osr-basic-spell-books', name: 'Basic Spell Books', description: 'Build custom Labyrinth Lord spell listings with flexible sorting, filtering, and optional spell-reference details.' },
      { slug: 'osr-area-builder', name: 'Area Builder', description: 'Generate a compact adventure area with encounters, traps, atmosphere, and loot controls for multiple game systems.' },
      { slug: 'osr-random-treasure', name: 'Random Treasure', description: 'Create batches of treasure sets with valuables/relic weighting, list mode, and system-specific options.' },
      { slug: 'osr-mutant-settlements', name: 'Mutant Settlements', description: 'Generate mutant settlements with citizens, businesses, and officials.' },
      { slug: 'osr-fantasy-names', name: 'Fantasy Names', description: 'Select one or more categories and generate a batch of names for each category.' },
      { slug: 'osr-adventurers-guild-osric', name: 'Adventurers Guild (OSRIC)', description: 'Generate OSRIC-style adventurers with listing or sheet-style output.' },
      { slug: 'osr-spell-books', name: 'Spell Books', description: 'Build custom OSRIC / Advanced Edition fantasy spell listings with sorting, filters, and detailed spell cards.' },
      { slug: 'osr-adventuring-gear', name: 'Adventuring Gear', description: 'Generate random fantasy adventuring gear packs.' },
      { slug: 'osr-potion-appearances', name: 'Potion Appearances', description: 'Generate potion appearances or full potion lists by game system.' },
      { slug: 'osr-scavenging-lists', name: 'Scavenging Lists', description: 'Create building and corpse scavenging item lists for post-apocalyptic and horror play.' },
      { slug: 'osr-sci-fi-enemies', name: 'Sci-Fi Enemies', description: 'Generate random robots and mutants/aliens for sci-fi and post-apocalyptic campaigns.' },
      { slug: 'osr-sci-fi-maps', name: 'Sci-Fi Maps', description: 'Generate random building, spaceship, or exodus-ship maps with optional area numbering and color mode.' },
      { slug: 'osr-suburb-maps', name: 'Suburb Maps', description: 'Generate random suburb map layouts from geomorph tiles at your chosen dimensions.' },
      { slug: 'osr-sewer-maps', name: 'Sewer Maps', description: 'Generate random sewer networks with configurable room density and optional keyed area numbering.' },
      { slug: 'osr-random-treasure-maps', name: 'Random Treasure Maps', description: 'Generate random treasure map descriptions ranked by level.' },
      { slug: 'osr-fantasy-settlements-ttown', name: 'Fantasy Settlements', description: 'Generate a random Tunnels & Trolls settlement with configurable map size, institutions, stock levels, and resident kindred.' },
      { slug: 'osr-futuristic-maze', name: 'Futuristic Maze', description: 'Generate exodus or crashed spaceships for fantasy parties with configurable encounter and loot behavior.' },
      { slug: 'osr-dungeon-builder', name: 'Dungeon Builder', description: 'Build a dungeon or cavern layout with source-tile mix, room indexing, and adventure content generation controls.' },
      { slug: 'osr-mutant-adventure', name: 'Mutant Adventure', description: 'Generate post-apocalyptic buildings, ruined cities, and derelict ships with configurable encounters, traps, contents, and loot.' },
      { slug: 'osr-settlement-maps', name: 'Settlement Maps', description: 'Generate random city, keep, or village layouts with optional keyed building numbering.' },
      { slug: 'osr-wandering-enemies', name: 'Wandering Enemies', description: 'Generate random encounter table entries by game, level, terrain, and source options.' },
      { slug: 'osr-world-maps', name: 'World Maps', description: 'Generate a randomized world or underworld hex map with configurable style, climate, borders, and map information.' },
      { slug: 'osr-fantasy-settlements-wtown', name: 'Fantasy Settlements', description: 'Generate fantasy settlements with citizens, institutions, and power structure.' },
      { slug: 'osr-zombie-hordes', name: 'Zombie Hordes', description: 'Create random zombie groups for survival-horror play, including Necropalyx and generic modes.' }
    ];

    const grid = document.getElementById('tool-grid');
    const searchInput = document.getElementById('tool-search');
    const emptyState = document.getElementById('empty-state');

    function render(query = '') {
      const normalized = query.trim().toLowerCase();
      const visible = tools.filter((tool) => {
        if (!normalized) return true;
        return (
          tool.name.toLowerCase().includes(normalized) ||
          tool.slug.toLowerCase().includes(normalized) ||
          tool.description.toLowerCase().includes(normalized)
        );
      });

      grid.innerHTML = visible.map((tool) => `
        <div class="col-12 col-md-6 col-xl-4">
          <a class="tool-link" href="./${tool.slug}.html">
            <article class="card tool-card">
              <div class="card-body">
                <h2 class="h6 mb-1">${tool.name}</h2>
                <div class="small text-muted mb-2">${tool.slug}</div>
                <p class="mb-0 text-muted">${tool.description}</p>
              </div>
            </article>
          </a>
        </div>
      `).join('');

      emptyState.classList.toggle('d-none', visible.length > 0);
    }

    searchInput.addEventListener('input', (event) => render(event.target.value));
    render();
  </script>
</body>
</html>
