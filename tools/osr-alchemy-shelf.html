<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Alchemy Shelf | Wizardawn Converted</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./osr-support-files/shared/css/global.css" rel="stylesheet">
  <link href="./osr-alchemy-shelf/styles.css" rel="stylesheet">
</head>
<body>
  <main class="wiz-tool-shell">
    <header class="wiz-tool-header">
      <h1 class="h3 mb-1">Alchemy Shelf</h1>
      <p class="text-muted mb-0">Generate items for an alchemy shelf or wizard laboratory.</p>
    </header>

    <section class="card mb-3">
      <div class="card-body">
        <form id="tool-form" class="row g-3">
          <div class="col-md-4">
            <label for="game" class="form-label">Game</label>
            <select id="game" name="game" class="form-select">
              <option value="Fantasy" selected>Fantasy</option>
              <option value="Labyrinth Lord">Labyrinth Lord</option>
              <option value="OSRIC">OSRIC</option>
              <option value="AD&D">AD&D</option>
              <option value="BFRPG">BFRPG</option>
              <option value="BD&D">BD&D</option>
              <option value="Swords &amp; Wizardry">Swords &amp; Wizardry</option>
              <option value="Swords &amp; Six-Siders">Swords &amp; Six-Siders</option>
              <option value="Tunnels &amp; Trolls 5th Edition">Tunnels &amp; Trolls 5th Edition</option>
              <option value="Tunnels &amp; Trolls 7th Edition">Tunnels &amp; Trolls 7th Edition</option>
              <option value="Tunnels &amp; Trolls Deluxe">Tunnels &amp; Trolls Deluxe</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="amount" class="form-label">Amount</label>
            <input id="amount" name="amount" type="number" min="1" max="100" value="12" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="potion-rate" class="form-label">Potion %</label>
            <input id="potion-rate" name="potionRate" type="number" min="0" max="100" value="30" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="value-min" class="form-label">Value Min</label>
            <input id="value-min" name="valueMin" type="number" min="0" max="1000" value="0" class="form-control">
          </div>
          <div class="col-md-2">
            <label for="value-max" class="form-label">Value Max</label>
            <input id="value-max" name="valueMax" type="number" min="0" max="1000" value="0" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input id="ua" name="ua" type="checkbox" value="1" class="form-check-input">
              <label for="ua" class="form-check-label">Include UA</label>
            </div>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input id="aec" name="aec" type="checkbox" value="1" class="form-check-input">
              <label for="aec" class="form-check-label">Include AEC</label>
            </div>
          </div>
          <div class="col-md-4">
            <label for="seed" class="form-label">Seed</label>
            <input id="seed" name="seed" type="text" class="form-control" placeholder="optional seed">
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Generate</button>
            <button id="export-json" type="button" class="btn btn-outline-secondary">Export JSON</button>
            <button id="export-md" type="button" class="btn btn-outline-secondary">Export Markdown</button>
            <button id="export-html" type="button" class="btn btn-outline-secondary">Export HTML</button>
          </div>
        </form>
      </div>
    </section>

    <section class="wiz-tool-output" id="output" aria-live="polite">
      <em>Output will appear here.</em>
    </section>
  </main>

  <script src="./osr-support-files/shared/js/core.js"></script>
  <script src="./osr-support-files/shared/js/data.js"></script>
  <script src="./osr-alchemy-shelf/app.js"></script>
</body>
</html>
