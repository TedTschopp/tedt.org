quick_comparisons:
- title: Fallacies vs Biases
  summary: A fallacy is a mistake in the argument. A bias is a tilt in how the mind judges the facts.
  url: /tools/Brain-Bugs/compare/fallacies-vs-biases/
- title: Biases vs Heuristics
  summary: A bias bends judgment in a direction. A heuristic is a quick rule of thumb that can help or mislead.
  url: /tools/Brain-Bugs/compare/biases-vs-heuristics/
- title: Sunk Cost vs Escalation of Commitment
  summary: Sunk cost is sticking with a bad choice because of past cost. Escalation adds more and more to save face.
  url: /tools/Brain-Bugs/compare/sunk-cost-vs-escalation-of-commitment/
- title: Appeal to Emotion vs Loaded Language
  summary: One uses feeling as proof. The other uses hot wording to frame the issue before proof is tested.
  url: /tools/Brain-Bugs/compare/appeal-to-emotion-vs-loaded-language/
- title: Hindsight Bias vs Narrative Fallacy
  summary: One makes the ending feel obvious after the fact. The other turns messy reality into a neat story.
  url: /tools/Brain-Bugs/compare/hindsight-bias-vs-narrative-fallacy/
- title: Base Rate Neglect vs Availability Heuristic
  summary: One skips the background odds. The other lets a vivid example feel more common than it is.
  url: /tools/Brain-Bugs/compare/base-rate-neglect-vs-availability-heuristic/
