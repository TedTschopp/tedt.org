quick_comparisons:
- title: Fallacies vs Biases
  summary: A fallacy is a mistake in the argument. A bias is a tilt in how the mind judges the facts.
  url: /tools/Brain-Bugs/compare/fallacies-vs-biases/
- title: Biases vs Heuristics
  summary: A bias bends judgment in a direction. A heuristic is a quick rule of thumb that can help or mislead.
  url: /tools/Brain-Bugs/compare/biases-vs-heuristics/
- title: Sunk Cost vs Escalation of Commitment
  summary: Sunk cost is sticking with a bad choice because of past cost. Escalation adds more and more to save face.
  url: /tools/Brain-Bugs/compare/sunk-cost-vs-escalation-of-commitment/
learning_paths:
- title: Spot bad arguments
  summary: Learn to catch personal attacks, weak rewrites, false either-or claims, and crowd pressure.
- title: Understand brain shortcuts
  summary: Notice how the mind grabs the most comfortable, familiar, or recent answer.
- title: Make better decisions
  summary: Slow down when cost, stress, and overload start steering the choice.
