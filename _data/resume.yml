content:
  basics:
    name: Ted Tschopp
    email: ted@tschopp.org
    headline: Senior Enterprise Architect
    phone: null
    summary: >-
      I am a Senior Enterprise Architect based in Los Angeles, working at the intersection of enterprise architecture, artificial intelligence, software strategy, and digital automation. At Southern California Edison, I help shape architecture strategy for AI, software, and enterprise products that support one of the nation's largest electric utilities. My work sits where strategy meets execution: platforms, guardrails, operating models, governance, risk, developer experience, and the practical realities of making ambitious technology useful, resilient, and sustainable inside a large organization.
    url: https://tedt.org/
  location:
    city: Los Angeles
    region: California
    country: United States
  profiles:
  - network: GitHub
    username: TedTschopp
    url: https://github.com/TedTschopp
  - network: LinkedIn
    username: tedtschopp
    url: https://www.linkedin.com/in/tedtschopp/
  - network: Twitter
    username: TedTschopp
    url: https://twitter.com/TedTschopp
  education: []
  work:
  - name: Southern California Edison
    position: Enterprise Architect, AI & Software
    startDate: "2020-01-01"
    endDate: null
    summary: |
      I provide strategic architecture leadership for SCE's AI and software
      portfolios, shaping strategy, roadmaps, standards, and frameworks for
      500+ enterprise products.

      - Built and executed an enterprise AI strategy, enabling
      cross-functional adoption and measurable business outcomes.
      - Partnered with Legal, Information Governance, the AI CoE, and industry
      groups to establish AI governance frameworks and coding standards.
      - Designed a desktop automation framework that deployed 300+ virtual
      employees.
      - Pioneered LLM-enabled AIOps patterns for telemetry analysis, incident
      correlation, and response.
      - Served as architect and process owner for SCE's first sanctioned
      business-partner development program since 1997.
    keywords:
    - AI strategy
    - Governance
    - AIOps
    - Automation
    - Platform strategy
  - name: Southern California Edison
    position: Process Manager for Engineering and Build Process
    startDate: "2020-01-01"
    endDate: null
    summary: |
      I oversee end-to-end management and governance of Solutions Engineering
      and Build processes, serving as a key advisor for process improvement
      and best practices.

      - Extended source control from compliance-focused products to all
      company offerings.
      - Led DevOps strategy implementation to improve collaboration and
      accelerate time-to-market.
      - Promoted Agile methods to create a more collaborative and adaptive
      engineering culture.
      - Used Lean Six Sigma practices and quarterly Kaizens to reduce waste.
      - Established coding standards and secure coding practices across
      development teams.
    keywords:
    - DevOps
    - Lean Six Sigma
    - Secure coding
    - Agile
    - Process improvement
  - name: Southern California Edison
    position: Senior Solution Architect for SCE.com
    startDate: "2010-01-01"
    endDate: "2020-01-01"
    summary: |
      I served as technical team lead and single point of technical
      accountability for SCE's eCommerce channel.

      - Reduced third-party vendor costs by 50% to deliver SCE's first mobile
      app for iPhone and Android.
      - Cut SCE.com rebranding project costs from $13MM to under $1MM using
      agile methods.
      - Increased user satisfaction ratings by 20 index points through a
      mobile-first strategy.
      - Supported business case development for $70MM and $25MM capital
      programs.
      - Drove a 40% increase in self-service transaction growth.
      - Improved turn-on/off service transactions by 75% while reducing manual
      order processing by 70%.
    keywords:
    - Web architecture
    - Mobile first
    - eCommerce
    - Customer experience
    - Agile
  - name: Southern California Edison
    position: Practice Lead - SAP Portal / Web
    startDate: "2004-09-01"
    endDate: "2010-01-01"
    summary: |
      I served as a senior leader overseeing SAP Portal and Web Development
      teams, with combined responsibility for more than 40 professionals.

      - Led a team of 10+ SAP Portal developers focused on SAP HCM and EAM.
      - Acted as Practice Lead for a community of 30+ web developers.
      - Orchestrated decommissioning of 150 legacy business applications.
      - Engineered a data center routing solution at the Edison International
      level.
      - Led corporate intranet and Edison.com rebranding work recognized by
      the Web Marketing Association and The American Business Awards.
      - Presented SCE's SOA integration practices at the NetWeaver Portal/BI
      Conference.
    keywords:
    - SAP Portal
    - Web development
    - SOA
    - Intranet
    - Legacy modernization
  - name: The One Ring - Tolkien Online
    position: Founder and CTO
    startDate: "1999-04-01"
    endDate: "2004-09-01"
    summary: |
      I founded and operated a leading website dedicated to J.R.R. Tolkien and
      The Lord of the Rings.

      - Earned media coverage from the Los Angeles Times, CNN, and The
      Guardian UK.
      - Was featured in an extensive interview in the September 2001 issue of
      Wired Magazine.
      - Achieved a top 10,000 ranking on Alexa, reflecting the site's reach
      and niche authority.
    keywords:
    - Community building
    - Web publishing
    - Storytelling
    - Digital media
  - name: The Dohring Company
    position: Director of Technical Services
    startDate: "1994-02-01"
    endDate: "1999-05-01"
    summary: |
      I directed a team overseeing market research, surveys, and call center
      operations across customer and competitor research landscapes.

      - Led the transition from Microsoft Word for DOS 5.1 to Windows 95 and
      Microsoft Office 95.
      - Created a product and market research report by combining geospatial
      data and survey findings with Microsoft Word and MapInfo.
      - Increased team productivity by 24% without increasing headcount.
    keywords:
    - Market research
    - Geospatial analysis
    - Call centers
    - Forecasting
    - Process improvement
  projects:
  - name: Corporate Intranet Redesign
    startDate: "2004-03-13"
    summary: |
      Updated SCE's corporate intranet with new branding, templates, menuing
      systems, AJAX, RSS, and improvements to the employee directory and paging
      system.

      - Developed a refreshed home page and seven templates using the Building
      the Future branding.
      - Integrated HTML, XML, RSS, AJAX, and Perl with Netscape Web Server and
      Sybase database technologies.
      - Implemented an AJAX RSS reader, portlet-style content wells, and
      upgrades to two heavily used internal applications.
    keywords:
    - HTML
    - XML
    - RSS
    - AJAX
    - Perl
    url: https://tedt.org/career/#corporate-intranet-redesign
  - name: Edison.com Redesign - Corporate Website
    startDate: "2005-03-13"
    summary: |
      Redesigned Edison International's public corporate website with
      Corporate Communications, Investor Relations, and an external design
      firm.

      - Modernized Edison International's web presence while preserving the
      company's history as a California utility service provider.
      - Overhauled the site's content structure and backend CMS across five
      servers with distinct domains and assets.
      - Used ASP, MSSQL, Microsoft Site Server, Windows 2003, HTML, RSS,
      Flash, XML, and JavaScript on a project recognized with three awards.
    keywords:
    - ASP
    - MSSQL
    - CMS
    - JavaScript
    - Corporate web
    url: https://tedt.org/career/#edison-com-redesign-corporate-website
  - name: MyEdison.com - Corporate Portal
    startDate: "2005-03-13"
    summary: |
      Integrated internal web platforms into a unified corporate portal
      connected to the corporate directory and Factiva news/reporting
      capabilities.

      - Spearheaded integration of internal web platforms into a unified
      corporate portal.
      - Adapted the project through vendor and ERP strategy shifts while
      preserving alignment with organizational technology standards.
      - Worked with Plumtree, C#, B.NET, and J2EE on a portal that reached 500
      users at its peak.
    keywords:
    - Plumtree
    - C Sharp
    - J2EE
    - Portal
    - Factiva
    url: https://tedt.org/career/#myedison-com-corporate-portal
  - name: Edison International Portal - Corporate Portal
    startDate: "2006-03-13"
    summary: |
      Created a corporate portal that consolidated internal websites and prior
      portal initiatives, with SAP integration as the core architectural
      requirement.

      - Initiated a consolidation effort for internal websites and legacy
      portal initiatives.
      - Used SAP Portal, Java, XHTMLB, and HTMLB to build a cohesive portal.
      - Ensured the project met its primary business objective of integrating
      cleanly with SAP systems.
    keywords:
    - SAP Portal
    - Java
    - XHTMLB
    - HTMLB
    - Portal
    url: https://tedt.org/career/#edison-international-portal-corporate-portal
  - name: Edison SmartConnect
    startDate: "2011-03-01"
    summary: |
      Led web portal architecture for SCE's Edison SmartConnect project,
      supporting installation of more than 5 million smart meters across a
      50,000-square-mile service territory.

      - Led web portal architecture for SCE's $1.6 billion SmartConnect
      project.
      - Enabled real-time electricity tracking and two-way communication for
      residential and small-business customers.
      - Directed web technology integration using HTML, Flash, XML, and
      JavaScript.
      - Improved customer experience for energy management and service
      transfers.
    keywords:
    - Smart meters
    - Web portal
    - HTML
    - XML
    - Customer experience
    url: https://tedt.org/career/#edison-smartconnect
