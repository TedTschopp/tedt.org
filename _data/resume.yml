references:
- name: Christopher Hurney
  headline: >-
    I help organizations and teams reduce delivery bottlenecks, improve flow, and modernize product delivery during digital and AI transformations, leveraging lean / agile principles and technical excellence.
  source: LinkedIn
  date: "2023-05-04"
  relationship: Ted was senior to Christopher but did not manage Christopher directly.
  visibility: All LinkedIn members
  visible: true
  reference: >-
    As an agile coach entering an engagement with a large corporation, you are often curious, even concerned, about whether or not there will be anyone within the organization with empathy for the types of change we intend to explore. With Ted I found such an empath. Ted has one of the highest acumen I've encountered when it comes to topics such as code craftsmanship, highly collaborative coding techniques, DevOps, waste mitigation, and just generally helping bring about change that aligns with agile values, lean and agile principles, not for the sake of just doing things to do things, but to better equip the organization to create value for its customers. Endeavors that allow me to collaborate with Ted are the highlight of my agile coaching engagement at Southern California Edison.
- name: Karen Agg
  headline: Retired Senior Project Manager/Certified Scrum Master
  source: LinkedIn
  date: "2013-02-01"
  relationship: Karen worked with Ted on the same team.
  visibility: All LinkedIn members
  visible: false
  reference: >-
    Ted and I have been colleagues for 10+ years. Over the years we have worked in the same group and different groups. Our most recent opportunity to work together was a project to create the first mobile website/app for SCE, which was a big success. What impresses me most about Ted is his ability to take complex architectural concepts and explain them so anyone can understand. Ted is a forward thinker and strives to create a solution to satisfy the business need now and scale for the future. Ted is great to work with. I highly recommend Ted.
