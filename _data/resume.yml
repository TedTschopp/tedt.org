work:
- company: Southern California Edison
  position: Enterprise Architect, Artificial Intelligence & Software
  startDate: 2020-01-01
  endDate: null
  summary: >-
    I am the Enterprise Architect for AI & Software. I provide strategic architecture leadership for SCE's AI and software portfolios, shaping strategy, roadmaps, and frameworks for 500+ enterprise products. Align innovation with business outcomes, resilience, and regulatory expectations.
  highlights:
  - "AI Strategic Leadership: Built and executed an enterprise AI strategy, enabling cross-functional adoption and measurable business outcomes."
  - "AI Governance & Standards: Partnered with Legal, Information Governance, the AI CoE, and industry groups to establish AI governance frameworks and coding standards, embedding compliance, trust, and accountability across initiatives."
  - "Enterprise Automation: Designed a desktop automation framework that deployed 300+ virtual employees, reducing manual workloads, slashing error rates, and unlocking enterprise-wide productivity and engagement gains."
  - "AI-Driven IT Ops: Pioneered the shift from reactive IT operations to LLM-enabled AIOps. Automated telemetry analysis, incident correlation, and response, accelerating resolution times, reducing overhead, and setting a new standard of service resilience."
  - "Business-Led Development: Architect and process owner for SCE's first sanctioned business-partner development program since 1997, enabling 100+ developers to build and manage over 1,000 applications. This program democratized software creation, expanded innovation capacity, and established guardrails that balanced agility with enterprise compliance."
- company: Southern California Edison
  position: Process Manager for Engineering and Build Process
  startDate: 2020-01-01
  endDate: null
  summary: >-
    I oversee the end-to-end management and governance of Solutions Engineering and Build processes, serving as a key advisor for process improvement and best practices.
  highlights:
  - "Strategically extended the use of source control mechanisms from compliance-focused products to encompass all company offerings, enhancing code consistency and facilitating more efficient development cycles across the enterprise."
  - "Formulated and led the implementation of a DevOps strategy, unifying software development and IT operations to enhance collaboration and accelerate time-to-market for new product features."
  - "Championed a cultural shift within the organization by introducing and promoting Agile methodologies, fostering a more collaborative and adaptive work environment to better respond to business needs."
  - "Attained Lean Six Sigma certification and leveraged it to conduct quarterly Kaizens, strategically refining the build and engineering processes to eliminate waste and enhance value to the business."
  - "Established and enforced coding standards and secure coding practices across the development teams, elevating code quality and reducing vulnerabilities to fortify the company's software products."
- company: Southern California Edison
  position: Senior Solution Architect for SCE.com
  startDate: 2010-01-01
  endDate: 2020-01-01
  summary: >-
    I served as the technical team lead and the single point of contact for technical accountability on SCE's eCommerce channel, overseeing the project from concept through completion.
  highlights:
  - "Reduced third-party vendor costs by 50% to deliver SCE's first mobile app for iPhone and Android."
  - "Cut costs of the SCE.com rebranding project from $13MM to under $1MM by implementing agile methodologies."
  - "Represented SCE's digital and web interests in the UNITE group and IBM Digital Experience Customer Advisory Council."
  - "Increased user satisfaction ratings by 20 index points through a mobile-first strategy."
  - "Supported business case development for a $70MM capital program."
  - "Supported business case development for a $25MM capital program."
  - "Drove a 40% increase in self-service transaction growth."
  - "Boosted mobile page views by 1000%, reaching 40% of total site traffic."
  - "Improved turn-on/off service transactions by 75% while reducing manual order processing by 70%."
  - "Led the development of user privacy, security, and identity management upgrades."
- company: Southern California Edison
  position: Practice Lead - SAP Portal / Web
  startDate: 2004-09-01
  endDate: 2010-01-01
  summary: >-
    Served as a senior leader overseeing both SAP Portal and Web Development teams at SCE, with combined responsibility for more than 40 professionals in specialized domains.
  highlights:
  - "Led a dedicated team of over 10 SAP Portal Developers, focusing on the development and maintenance of SCE's SAP Portal with specialized expertise in SAP HCM and EAM."
  - "Acted as the Practice Lead for a community of over 30 web developers, responsible for the development and ongoing maintenance of SCE's enterprise-level websites."
  - "Orchestrated the decommissioning of 150 legacy business applications, enhancing operational efficiency and resource optimization."
  - "Engineered a data center routing solution at the Edison International level, collaborating with stakeholders from Edison International companies and SCE."
  - "Spearheaded the rebranding of the corporate intranet and Edison.com website, aligning both with organizational changes and earning accolades from the Web Marketing Association and The American Business Awards."
  - "Presented on behalf of SCE at the NetWeaver Portal/BI Conference, sharing valuable insights into SCE's SOA integration practices."
  - "Acted as an annual judge for the Cal Poly CIS ITC web design competition, representing SCE and contributing to the broader web development community."
- company: The One Ring - Tolkien Online
  position: Founder and CTO
  startDate: 1999-04-01
  endDate: 2004-09-01
  summary: >-
    Founded and operated a leading website dedicated to J.R.R. Tolkien and The Lord of the Rings, gaining notable recognition in the media landscape.
  highlights:
  - "Garnered media coverage from outlets including the Los Angeles Times, CNN, and The Guardian UK, establishing the website as an authoritative source in the field."
  - "Featured in an extensive interview in the September 2001 issue of Wired Magazine, amplifying the site's reputation and reach."
  - "Achieved a top 10,000 ranking on Alexa, underlining the website's popularity and impact in its niche."
- company: The Dohring Company
