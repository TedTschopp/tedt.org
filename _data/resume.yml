  references:
  - name: Christopher Hurney
    relationship: May 4, 2023; senior colleague, not direct manager
    summary: >-
      As an agile coach entering an engagement with a large corporation, you are often curious, even concerned, about whether or not there will be anyone within the organization with empathy for the types of change we intend to explore. With Ted I found such an empath. Ted has one of the highest acumen I've encountered for code craftsmanship, collaborative coding techniques, DevOps, waste mitigation, and change aligned with agile values, lean and agile principles. Endeavors that allow me to collaborate with Ted are the highlight of my agile coaching engagement at Southern California Edison.
  - name: Karen Agg
    relationship: February 1, 2013; colleague on the same team
    summary: >-
      Ted and I have been colleagues for 10+ years. Our most recent opportunity to work together was a project to create the first mobile website/app for SCE, which was a big success. What impresses me most about Ted is his ability to take complex architectural concepts and explain them so anyone can understand. Ted is a forward thinker and strives to create a solution to satisfy the business need now and scale for the future. Ted is great to work with. I highly recommend Ted.
  - name: Greg Goldasich
    relationship: January 31, 2013; senior colleague, not direct manager
    summary: >-
      Ted is very collaborative by nature, effective in meeting his commitments and consistently drives to improve work/product quality. He actively engages with team members, managers and clients to deliver on his commitments. Ted openly and actively seeks out feedback on his approach and effectiveness. He is curious by nature, which pushes him to improve his technical knowledge and drive his work forward.
  - name: Mike de la Hoz
    relationship: January 31, 2013; colleague on different teams
    summary: >-
      I've worked with Ted on several digital projects at Southern California Edison. I find him to be intrinsically curious, and his thirst for knowledge drives him to always find a better way to deliver product. When Ted provides system design and architecture advice and recommendations, you can bank on him thoroughly doing his research to come up with a sound conclusion. He's a good business partner and collaborator always seeking to do the right thing.
  - name: Michael Jackson
    relationship: January 17, 2013; colleague on different teams
    summary: >-
      I have known Ted for many years at Southern California Edison, and admire his expertise and broad knowledge of numerous technologies. While technical skills are his specialty, Ted is also down to earth, open, friendly and approachable. He is an excellent public speaker and comfortable leading meetings on technology topics. A top-notch webmaster, developer and collaboration SME with great people skills.
  - name: Kristina Quick
    relationship: January 8, 2013; colleague on different teams
    summary: Ted's dedication and investment in this program made it a huge success.
  - name: Kristina Quick
    relationship: January 8, 2013; colleague on the same team
    summary: >-
      Ted's positivity, collaboration, and expert technical knowledge is part of what made this team successful.
  - name: Kristina Quick
    relationship: January 8, 2013; colleague on the same team
    summary: >-
      Ted is a great team player and understands technology from all aspects. He is an asset to any team.
  - name: Situ Ramaswamy
    relationship: January 7, 2013; direct manager
    summary: >-
      Ted keeps up with more technologies than most of the technologists I have worked with, and brought an excellent mix of superior technical skills and great teamwork to all his assignments. One of the things that I found most gratifying was to see Ted's growth as an architect and technical leader through the significant programs he worked on over the years.
  - name: Kevin Liao
    relationship: July 31, 2011; senior colleague, not direct manager
    summary: >-
      A futurist who is able to analyze and predict both short and long term industry landscape changes, Ted is forward thinking and a blast to work with. I also highly recommend subscribing to his RSS feed where he curates insightful articles of all subjects.
  - name: Gabriela Garcia
    relationship: February 24, 2006; client
    summary: >-
      One of the best and brightest at Edison. If you have Ted on your team, you know your project will get done on time and the way you want it.
