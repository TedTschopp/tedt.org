<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mandelbrot Deep Zoom preview</title>
  <desc id="desc">Abstract preview image for the Mandelbrot Deep Zoom tool with a glowing fractal card over a dark grid background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04070d"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#150b2b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.45"/>
  <circle cx="1230" cy="190" r="240" fill="#38bdf8" opacity="0.08"/>
  <circle cx="290" cy="730" r="300" fill="#f472b6" opacity="0.07"/>

  <g transform="translate(205 135)">
    <rect x="0" y="0" width="1190" height="630" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="36" y="36" width="1118" height="558" rx="18" fill="#020617" stroke="rgba(255,255,255,0.08)"/>

    <g opacity="0.9">
      <rect x="76" y="76" width="180" height="12" rx="6" fill="#334155"/>
      <rect x="76" y="104" width="250" height="12" rx="6" fill="#1e293b"/>
      <rect x="918" y="76" width="196" height="94" rx="14" fill="#0f172a" stroke="rgba(255,255,255,0.08)"/>
      <rect x="946" y="102" width="140" height="10" rx="5" fill="#475569"/>
      <rect x="946" y="126" width="116" height="10" rx="5" fill="#334155"/>
    </g>

    <g transform="translate(150 150)">
      <rect x="0" y="0" width="730" height="340" rx="24" fill="#020617" stroke="rgba(255,255,255,0.12)"/>

      <path d="M160 170
               C160 102 204 62 268 62
               C322 62 354 94 358 140
               C360 164 348 184 322 194
               C348 202 362 224 360 250
               C356 298 322 332 266 332
               C202 332 160 292 160 224
               C160 200 168 182 184 170
               C168 158 160 146 160 170 Z"
            fill="none" stroke="url(#glow)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

      <g fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.7">
        <path d="M176 170 C176 112 214 78 268 78"/>
        <path d="M176 222 C176 278 210 316 266 316"/>
        <path d="M222 170 C222 150 236 138 256 138 C279 138 292 152 294 170 C296 190 284 204 262 208"/>
        <path d="M222 224 C224 246 238 258 260 258 C280 258 294 244 294 224 C294 204 280 192 258 192"/>
      </g>

      <g stroke="rgba(148,163,184,0.24)">
        <line x1="0" y1="170" x2="730" y2="170"/>
        <line x1="365" y1="0" x2="365" y2="340"/>
      </g>

      <g fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24">
        <text x="416" y="96">Center: -0.743643887037, 0.131825904205</text>
        <text x="416" y="136">Scale: 1.0e-08   Depth: 8.0   Iter: 1160</text>
        <text x="416" y="176">Mode: double-float emulation</text>
      </g>
    </g>

    <g fill="#e2e8f0" font-family="Avenir Next, Segoe UI, sans-serif">
      <text x="76" y="548" font-size="40" font-weight="700">Mandelbrot Deep Zoom</text>
      <text x="76" y="586" font-size="26" opacity="0.8">Interactive WebGL fractal explorer with deeper precision and smooth navigation.</text>
    </g>
  </g>
</svg>