#   author: tschopp
#
# Multiple authors (new array format):
#   authors:
#     - tschopp
#     - copilot
#
# You can also mix registry keys with inline definitions:
#   authors:
#     - tschopp
#     - name: Guest Contributor
#       url: https://example.com
#
# Use {% assign author = site.authors[page.author] %} for single-author lookup
# Or use {% include utility/resolve-authors.html page=page %} for multi-author
