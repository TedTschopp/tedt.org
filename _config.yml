include:
- ".well-known"
- "_pages"

# Exclude editor backup copies of posts (e.g., *.md.bak) so they don't generate duplicate URLs
exclude:
- "**/*.bak"
# Exclude embedded Python virtual env inside data (never needed for site build)
- _data/Swiss-Folklore-Work-in-Progress/myenv/**
# Exclude large in-progress data (kept for future development; do not load or process)
- _data-to-be-developed/**

# Exclude temp worktrees (may contain non-Jekyll sources like Bootstrap's site)
- tmp/**

# Enable explicit kramdown + MathJax processing
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge
  hard_wrap: false
  parse_block_html: true
plugins:
- jekyll-redirect-from

# Jekyll expects 'url' (not siteurl) for absolute_url; leave baseurl blank (root)
url: https://tedt.org
# baseurl: ""   # keep commented / blank since site is served at domain root
# siteurl key removed after full migration to site.url

#description of the site for meta tags
description: "Technology, theology, and creativity converge in this insightful exploration by Ted Tschopp, who navigates the intricate relationship between these topics in the digital age. From dissecting how technology is reshaping religious practices and ethics to sharing cutting-edge trends in UI/UX design, collaboration tools, and digital storytelling, the author provides a multifaceted analysis. Written with a unique and engaging blend of humor, reflection, and curiosity, this work invites readers to ponder and discuss these connections, offering a contemplative lens on modern innovation and cultural evolution."

keywords:
- Technology
- Theology
- Creativity
- Religion
- digital age
- UI/UX
- Collaboration tools
- Storytelling

# Permalink 
permalink: /:title/

