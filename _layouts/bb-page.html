---
layout: bb-default
---
<section class="container py-4 py-lg-5">
  {% include brain-bugs/bb-breadcrumbs.html %}
  <div class="row justify-content-center">
    <div class="col-12 col-xl-10">
      <header class="mb-4">
        {% if page.eyebrow %}
          <p class="bb-eyebrow mb-2">{{ page.eyebrow }}</p>
        {% endif %}
        <h1 class="bb-page-title mb-3">{{ page.title }}</h1>
        {% if page.lead %}
          <p class="fs-4 mb-0">{{ page.lead }}</p>
        {% endif %}
      </header>
      <div class="bb-surface p-4 p-lg-5">
        {{ content }}
      </div>
    </div>
  </div>
</section>
